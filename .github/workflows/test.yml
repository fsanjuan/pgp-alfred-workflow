name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install bats-core
        run: brew install bats-core

      - name: JS unit tests
        run: npm test

      - name: Shell script tests
        run: bats tests/encrypt.bats tests/decrypt.bats

      - name: Plist validation
        run: plutil -lint src/info.plist
