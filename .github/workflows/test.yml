name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install bats-core
        run: brew install bats-core

      - name: JS unit tests
        run: npm test

      - name: Shell script tests
        run: bats tests/encrypt.bats tests/decrypt.bats --report-formatter junit --output reports/

      - name: Plist validation
        run: plutil -lint src/info.plist

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: reports/*.xml
          reporter: java-junit
