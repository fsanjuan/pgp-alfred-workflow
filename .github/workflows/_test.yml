name: Test (reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: macos-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core
        run: brew install bats-core

      - name: Shell script tests
        run: bats tests/encrypt.bats tests/decrypt.bats tests/decrypt_open.bats tests/list_keys.bats --report-formatter junit --output reports/

      - name: Plist validation
        run: plutil -lint src/info.plist

      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: reports/*.xml
          detailed_summary: true
          include_passed: true
