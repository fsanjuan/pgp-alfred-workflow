name: Test (reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: macos-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install bats-core
        run: brew install bats-core

      - name: JS unit tests
        run: npm test

      - name: Shell script tests
        run: bats tests/encrypt.bats tests/decrypt.bats --report-formatter junit --output reports/

      - name: Plist validation
        run: plutil -lint src/info.plist

      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: reports/*.xml
          detailed_summary: true
          include_passed: true
