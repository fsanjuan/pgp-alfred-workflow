name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    permissions:
      checks: write
      contents: read

  release:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Build workflow
        run: bash build.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            alfred-pgp.alfredworkflow \
            --title "${{ github.ref_name }}" \
            --generate-notes
