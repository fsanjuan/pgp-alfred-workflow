name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v1.0.0)'
        required: true

jobs:
  test:
    uses: ./.github/workflows/_test.yml
    permissions:
      checks: write
      contents: read

  release:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Build workflow
        run: bash build.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          fi
          gh release create "$TAG" \
            alfred-pgp.alfredworkflow \
            --title "$TAG" \
            --generate-notes
